version: "3.9"

services:

  # ── FastAPI RAG Application ────────────────────────────────────────────────
  fastapi-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rag_api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      QDRANT_HOST: qdrant
      MONGO_URI: "mongodb://mongodb:27017"
    volumes:
      - .:/app
    depends_on:
      qdrant:
        condition: service_started
      mongodb:
        condition: service_healthy
    networks:
      - rag_network
    restart: on-failure

  # ── Qdrant Vector Database ─────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.9.2
    container_name: rag_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rag_network

  # ── MongoDB (document metadata store) ─────────────────────────────────────
  mongodb:
    image: mongo:7.0
    container_name: rag_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rag_network

volumes:
  qdrant_data:
  mongo_data:

networks:
  rag_network:
    driver: bridge
